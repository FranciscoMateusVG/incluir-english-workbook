    ============================================================================
    TABLE OF CONTENTS TEMPLATE

    ============================================================================
    -->

    <main class="workbook-content toc-content">
        <h1 class="toc-title">Table of Contents</h1>

        <nav class="toc-nav">
            <!--
            EXAMPLE STRUCTURE - Replace with actual content

            <div class="toc-chapter">

                    <span class="toc-dots"></span>
                    <span class="toc-page-number">1</span>
                </a>

                <div class="toc-units">
                    <a href="#unit-1-1" class="toc-unit-link">
                        <span class="toc-unit-number">1.1</span>
