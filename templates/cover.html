<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incluir English Workbook - Cover</title>
    <link rel="stylesheet" href="../styles/print.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body class="cover-page">
    <!--
    ============================================================================
    COVER PAGE TEMPLATE
    ============================================================================

    This page has NO header/footer and special full-page styling.
    The cover-page class on <body> triggers special CSS rules.

    ============================================================================
    -->

    <div class="cover-container">
        <div class="cover-header">
            <img src="../assets/images/incluir-logo.png" alt="Incluir" class="cover-logo">
        </div>

        <div class="cover-main">
            <h1 class="cover-title">English Learning Workbook</h1>
            <p class="cover-subtitle">{{subtitle}}</p>
            <p class="cover-level">{{level}}</p>
        </div>

        <div class="cover-footer">
            <p class="cover-edition">{{edition}}</p>
            <p class="cover-year">{{year}}</p>
        </div>
    </div>
</body>
</html>
